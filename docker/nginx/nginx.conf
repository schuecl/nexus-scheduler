# Local Compose reverse proxy — stands in for the reverse proxy that's
# already configured in the production environment (REQUIREMENTS §9.1).
# Not used in production; production points its own pre-existing nginx
# at the Service this chart exposes.
server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /healthz {
        proxy_pass http://api:3000;
    }

    location / {
        proxy_pass http://frontend:8080;
        proxy_set_header Host $host;
    }
}
