# Local Compose reverse proxy — stands in for the reverse proxy that's
# already configured in the production environment (REQUIREMENTS §9.1).
# Not used in production; production points its own pre-existing nginx
# at the Service this chart exposes.

# 127.0.0.11 is Docker Compose's embedded DNS server. A plain
# `proxy_pass http://api:3000;` resolves that hostname once, when this
# worker process starts, and caches the IP forever — so every time the
# `api` (or `frontend`) container gets recreated with a new internal IP
# (any rebuild, restart, or `docker compose up` that only recreates one
# service) nginx keeps routing to the old, now-dead address and every
# request 502s until nginx itself is restarted. Routing proxy_pass
# through a variable forces nginx to re-resolve via this resolver
# instead of caching at startup.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    location /api/ {
        # Attachment uploads are base64 JSON up to ~20MB (#109); nginx's
        # 1m default would 413 them before the API's own limits apply.
        # Production reverse proxies need the same allowance.
        client_max_body_size 21m;
        set $api_upstream api:3000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        set $api_upstream api:3000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /healthz {
        set $api_upstream api:3000;
        proxy_pass http://$api_upstream;
    }

    location / {
        set $frontend_upstream frontend:8080;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
    }
}
