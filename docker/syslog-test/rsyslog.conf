# Validated locally with `rsyslogd -N1` and exercised end to end against
# this repo's actual sendSyslogMessage() (packages/shared/src/syslog.ts)
# — UDP, plain TCP, and TLS-with-a-private-CA all confirmed delivering,
# and a TLS connection *without* the CA cert confirmed correctly
# rejected (verification is never disabled on the client side, so this
# receiver only accepts trust the same way a real one would).

module(load="imudp")
input(type="imudp" port="514")

module(load="imtcp")
# Plain RFC 6587-framed TCP — explicit ptcp driver so this listener is
# never accidentally upgraded by the TLS defaults below.
input(type="imtcp" port="601" streamDriver.name="ptcp")
# TLS, matching REQUIREMENTS/syslog.ts: server cert only, no client
# cert required (authMode=anon) — this integration never presents one.
input(type="imtcp" port="6514" streamDriver.name="gtls" streamDriver.mode="1" streamDriver.authMode="anon")

global(
  defaultNetstreamDriverCAFile="/etc/rsyslog-tls/ca.pem"
  defaultNetstreamDriverCertFile="/etc/rsyslog-tls/server-cert.pem"
  defaultNetstreamDriverKeyFile="/etc/rsyslog-tls/server-key.pem"
)

# Both a file (bind-mounted out, for `tail -f` or reviewing after the
# fact) and stdout (so `docker compose logs -f syslog-test` shows
# messages live with no extra setup).
action(type="omfile" file="/var/log/nexus-scheduler-test.log" template="RSYSLOG_TraditionalFileFormat")
action(type="omfile" file="/dev/stdout" template="RSYSLOG_TraditionalFileFormat")
