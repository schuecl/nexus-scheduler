server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routing (React Router) owns everything
    # under "/", the API/auth paths are proxied separately by the
    # environment's reverse proxy (REQUIREMENTS §9.1), not by this server.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
