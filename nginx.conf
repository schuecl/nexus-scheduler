# Reference nginx reverse-proxy config for Nexus Scheduler in PRODUCTION.
#
# REQUIREMENTS §9.1/§10: this chart does not deploy nginx — the target
# environment already runs nginx in front of applications, and that
# pre-existing instance is expected to point at the Service/Ingress this
# chart exposes. This file is a starting point for whoever configures
# that instance for this app; it is NOT consumed by the Helm chart or
# docker-compose (see docker/nginx/nginx.conf for the Compose stand-in,
# which is deliberately simpler since it only has to work against Docker's
# embedded DNS on a single host).
#
# Replace every <ANGLE_BRACKET> placeholder below before using this.
#
# Upstream addresses: fill these in with whatever actually resolves from
# this nginx instance to the cluster — a cluster-internal DNS name
# (<release>-frontend.<namespace>.svc.cluster.local) if nginx itself runs
# inside the cluster, or a NodePort/LoadBalancer/Ingress-controller
# address otherwise. This file assumes nginx reaches the app over plain
# HTTP on the cluster side and terminates TLS itself (REQUIREMENTS §10:
# "All traffic terminates TLS at the (externally managed) nginx layer in
# production"); re-encrypt to the upstream instead if your network policy
# requires it end to end.

# Every proxy_pass below goes through a $variable rather than a bare
# hostname so nginx re-resolves via this resolver on each request instead
# of caching the upstream IP for the life of the worker process — matters
# whenever the upstream is a K8s Service DNS name, since the Service's
# backing pod IPs (and, if this nginx runs outside the cluster, the
# Service/Ingress endpoint itself) can change without this nginx process
# restarting.
resolver <CLUSTER_DNS_RESOLVER_IP>; # e.g. kube-dns/CoreDNS ClusterIP, only
                                     # needed if the upstream host below is
                                     # a DNS name rather than a static IP

# HTTP: redirect to HTTPS. Keep this only if nginx itself terminates TLS
# (see the server block below) — drop it if TLS is terminated further
# upstream (e.g. an L4 load balancer) and this nginx only ever receives
# plain HTTP from a trusted network hop.
server {
    listen 80;
    server_name <NEXUS_SCHEDULER_HOSTNAME>;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on; # nginx >= 1.25 syntax; use `listen 443 ssl http2;` instead
              # on older builds commonly found in air-gapped environments
    server_name <NEXUS_SCHEDULER_HOSTNAME>;

    # FIPS-validated TLS termination (REQUIREMENTS §10) — point these at
    # certs issued by the environment's own PKI, not self-signed/ad hoc
    # ones. If CAC/PIV client-certificate verification happens at this
    # layer rather than being fully delegated to Keycloak (REQUIREMENTS
    # §4 — CAC/PIV is normally handled by the OIDC IdP, not by nginx),
    # add ssl_client_certificate/ssl_verify_client here instead; left out
    # by default since this app's documented auth flow expects Keycloak
    # to own that.
    ssl_certificate     <PATH_TO_FULLCHAIN_PEM>;
    ssl_certificate_key <PATH_TO_PRIVATE_KEY_PEM>;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    client_max_body_size 10m;

    access_log /var/log/nginx/nexus-scheduler.access.log;
    error_log  /var/log/nginx/nexus-scheduler.error.log;

    # API + session/OIDC routes -> the api Service (packages/api).
    # Matches this chart's Ingress template (helm/nexus-scheduler/templates/
    # ingress.yaml) so behavior is identical whether this environment's
    # existing nginx targets the Service directly or via that Ingress.
    location /api/ {
        set $nexus_api_upstream <API_SERVICE_HOST>:<API_SERVICE_PORT>; # e.g. nexus-scheduler-api.nexus-scheduler.svc.cluster.local:3000
        proxy_pass http://$nexus_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /auth/ {
        set $nexus_api_upstream <API_SERVICE_HOST>:<API_SERVICE_PORT>;
        proxy_pass http://$nexus_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        set $nexus_api_upstream <API_SERVICE_HOST>:<API_SERVICE_PORT>;
        proxy_pass http://$nexus_api_upstream;
        access_log off;
    }

    # Everything else -> the frontend Service (static SPA build served by
    # nginx-unprivileged inside the cluster, packages/frontend).
    location / {
        set $nexus_frontend_upstream <FRONTEND_SERVICE_HOST>:80; # e.g. nexus-scheduler-frontend.nexus-scheduler.svc.cluster.local:80
        proxy_pass http://$nexus_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
