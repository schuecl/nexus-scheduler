# Local dev/test stack — REQUIREMENTS.md §9.2. Has internet access and
# exists to exercise Nexus Scheduler itself; it does not attempt to
# simulate the air-gapped constraint of the production environment.
#
# Quick start:
#   ./scripts/generate-local-env.sh   # writes .env + docker/librechat/.env
#   docker compose up --build
#
# Then: http://localhost:8080 (app via local nginx), :8025 (Mailpit UI),
# :8081 (Keycloak, admin/${KEYCLOAK_ADMIN_PASSWORD}), :3080 (LibreChat).
#
# LibreChat needs at least one AI provider API key before it can run an
# Agent. Claude/Anthropic is wired up as the provider for local testing
# — set ANTHROPIC_API_KEY in this file's own root .env, then
# `docker compose restart librechat`. See README's Docker Compose
# section for the full first-run flow (register in LibreChat, create an
# Agent, generate a LibreChat API key, paste it into Nexus Scheduler's
# own API Keys page).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    # Local stand-in for CAC/PIV-capable OIDC (REQUIREMENTS §4). Configure
    # a realm/client manually via the admin console for end-to-end OIDC
    # testing — no realm is pre-provisioned here yet.

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

  librechat-mongo:
    image: mongo:8.0.20
    command: mongod --noauth
    volumes:
      - librechat-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The actual AI backend Nexus Scheduler's Worker calls (REQUIREMENTS
  # §2.1) — a real local install, not a mock, so job runs actually work
  # end to end. Minimal footprint: LibreChat's own default Compose setup
  # also includes Meilisearch (conversation search) and a RAG API +
  # pgvector (file-embedding search); neither is needed for the Agents
  # API this app calls, so both are omitted here and search is disabled
  # via SEARCH=false rather than left pointing at a service that isn't
  # running.
  librechat:
    image: registry.librechat.ai/danny-avila/librechat-dev:latest
    depends_on:
      librechat-mongo:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: mongodb://librechat-mongo:27017/LibreChat
      SEARCH: "false"
      # Claude as the provider for local testing — set ANTHROPIC_API_KEY
      # in this repo's own root .env (not docker/librechat/.env) so
      # there's one place to drop a real key. ENDPOINTS=anthropic keeps
      # LibreChat's UI to just that one provider rather than showing a
      # dropdown full of other unconfigured options nobody asked for.
      # Compose's injected environment here always wins over whatever's
      # in the bind-mounted docker/librechat/.env for the same key, so
      # that file no longer carries its own ANTHROPIC_API_KEY line.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENDPOINTS: anthropic
    volumes:
      - type: bind
        source: ./docker/librechat/.env
        target: /app/.env
      - librechat-images:/app/client/public/images
      - librechat-uploads:/app/uploads
      - librechat-logs:/app/logs
    ports:
      - "3080:3080"

  migrate:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: build
    command: ["npm", "run", "prisma:push", "--workspace=packages/shared"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      API_KEY_ENCRYPTION_KEY: ${API_KEY_ENCRYPTION_KEY}
      OIDC_ISSUER_URL: http://keycloak:8080/realms/nexus-scheduler
      OIDC_CLIENT_ID: nexus-scheduler
      OIDC_REDIRECT_URI: http://localhost:8080/auth/callback
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      LIBRECHAT_BASE_URL: ${LIBRECHAT_BASE_URL}
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    environment:
      NODE_ENV: development
      HEALTH_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_KEY_ENCRYPTION_KEY: ${API_KEY_ENCRYPTION_KEY}
      LIBRECHAT_BASE_URL: ${LIBRECHAT_BASE_URL}
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - frontend

volumes:
  postgres-data:
  redis-data:
  librechat-mongo-data:
  librechat-images:
  librechat-uploads:
  librechat-logs:
