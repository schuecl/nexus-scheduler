# Local dev/test stack — REQUIREMENTS.md §9.2. Has internet access and
# exists to exercise Nexus Scheduler itself; it does not attempt to
# simulate the air-gapped constraint of the production environment.
#
# Quick start:
#   ./scripts/generate-local-env.sh   # writes .env + docker/librechat/.env
#   docker compose up --build
#
# Then: http://localhost:8080 (app via local nginx), :8025 (Mailpit UI),
# :8081 (Keycloak, admin/${KEYCLOAK_ADMIN_PASSWORD}), :3080 (LibreChat),
# :4000/ui (LiteLLM admin, log in with LITELLM_MASTER_KEY from .env).
#
# LibreChat needs at least one AI provider before it can run an Agent.
# Two are wired up for local testing, either works, no config required
# beyond what's already here:
#   - Local models via LiteLLM -> Ollama (free, no API key) — the
#     litellm/ollama/ollama-pull services below, exposed to LibreChat
#     via docker/librechat/librechat.yaml as a custom endpoint. LiteLLM
#     is the model gateway: it meters every call (per-key spend, hard
#     budgets, RPM/TPM limits — usage data LibreChat's Agents API
#     doesn't provide, #38/#102) and routes to Ollama for inference.
#   - Claude/Anthropic — set ANTHROPIC_API_KEY in this file's own root
#     .env, then `docker compose restart litellm`. Served through the
#     same gateway (docker/litellm/config.yaml), never handed to
#     LibreChat directly, so hosted traffic is metered too.
#
# Memory limits (mem_limit) are set on every service so the full stack
# stays predictable on a 16GB host — caps, not reservations.
# See README's Docker Compose section for the full first-run flow
# (register in LibreChat, create an Agent, generate a LibreChat API
# key, paste it into Nexus Scheduler's own API Keys page).

# Every published host port is overridable from .env (issue #143) —
# defaults unchanged. E.g. another process owns 8081? Set
# KEYCLOAK_PORT=8082 instead of hand-editing this file:
#   APP_PORT (8080)  API_PORT (3000)  LIBRECHAT_PORT (3080)
#   LITELLM_PORT (4000)  KEYCLOAK_PORT (8081)  POSTGRES_PORT (5432)
#   MAILPIT_UI_PORT (8025)  MAILPIT_SMTP_PORT (1025)
#   SYSLOG_UDP_PORT (5514)  SYSLOG_TCP_PORT (5601)  SYSLOG_TLS_PORT (6514)
#   GRAFANA_PORT (3300, observability overlay)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    # Local stand-in for CAC/PIV-capable OIDC (REQUIREMENTS §4). Configure
    # a realm/client manually via the admin console for end-to-end OIDC
    # testing — no realm is pre-provisioned here yet.
    mem_limit: 1g

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025" # web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP
    mem_limit: 128m

  # Local stand-in for an on-prem syslog/SIEM receiver, so the syslog
  # audit-event mirror (REQUIREMENTS §7.1) can be exercised end to end
  # locally. The `api` container talks to this one over the Compose
  # network, so Admin Settings' syslog config should use the *service
  # name* and its native ports below — not the host-mapped ones further
  # down, which only exist for manually poking at this from your own
  # shell (e.g. `openssl s_client -connect localhost:6514`).
  # Check `docker compose logs -f syslog-test` for delivered messages.
  # Covers all three paths the mirror supports:
  #   - UDP:       host=syslog-test port=514  transport=UDP  tls=off
  #   - Plain TCP: host=syslog-test port=601  transport=TCP  tls=off
  #   - TLS:       host=syslog-test port=6514 transport=TCP  tls=on
  #                (upload docker/generated/syslog-test-certs/ca.pem as
  #                the CA certificate — generated by
  #                generate-local-env.sh, gitignored, never committed)
  syslog-test:
    build:
      context: ./docker/syslog-test
    ports:
      - "${SYSLOG_UDP_PORT:-5514}:514/udp" # host-only, for manual testing outside Compose
      - "${SYSLOG_TCP_PORT:-5601}:601"
      - "${SYSLOG_TLS_PORT:-6514}:6514"
    volumes:
      - ./docker/generated/syslog-test-certs/ca.pem:/etc/rsyslog-tls/ca.pem:ro
      - ./docker/generated/syslog-test-certs/server-cert.pem:/etc/rsyslog-tls/server-cert.pem:ro
      - ./docker/generated/syslog-test-certs/server-key.pem:/etc/rsyslog-tls/server-key.pem:ro
    mem_limit: 128m

  librechat-mongo:
    image: mongo:8.0.20
    command: mongod --noauth
    volumes:
      - librechat-mongo-data:/data/db
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Free, no-API-key-required local inference — reached only through the
  # litellm gateway below (which LibreChat talks to via
  # docker/librechat/librechat.yaml). CPU-only by default (no GPU
  # reservation) so this works the same on any machine; add a `deploy.
  # resources.reservations.devices` GPU block here if you have one and
  # want it faster.
  #
  # Deliberately NOT published to the host: Ollama has no auth, so the
  # only way in is through LiteLLM — which is what enforces metering,
  # budgets and rate limits on every call (#102). To poke at it
  # manually: docker compose exec ollama ollama list
  ollama:
    image: ollama/ollama:latest
    environment:
      # The pulled set below doesn't fit in RAM simultaneously on a 16GB
      # host — load one at a time, on demand, and evict after idling.
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "5m"
    volumes:
      - ollama-data:/root/.ollama
    mem_limit: 6g
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: pulls the local model set into the ollama service above
  # once it's up — gemma3:1b (default chat, 815MB), codegemma:2b
  # (coding, 1.6GB), phi4-mini-reasoning:3.8b (reasoning, 3.2GB); ~5.6GB
  # of disk in the ollama-data volume, loaded into RAM one at a time
  # (OLLAMA_MAX_LOADED_MODELS above). Override the set with
  # OLLAMA_PULL_MODELS in .env (space-separated); anything added here
  # also needs an entry in docker/litellm/config.yaml to be routable.
  # Only needs to run once per ollama-data volume — Ollama itself no-ops
  # a re-pull of a model it already has. Check `docker compose logs -f
  # ollama-pull` for download progress; it needs real internet access
  # the first time.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    mem_limit: 512m
    entrypoint: ["/bin/sh", "-c", "for m in ${OLLAMA_PULL_MODELS:-gemma3:1b codegemma:2b phi4-mini-reasoning:3.8b}; do OLLAMA_HOST=ollama:11434 ollama pull \"$$m\" || exit 1; done"]

  # LiteLLM's own Postgres — virtual keys, per-key spend, budgets. Kept
  # separate from the app's postgres so neither schema/lifecycle leaks
  # into the other.
  litellm-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD}
    volumes:
      - litellm-postgres-data:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The model gateway (#102): LibreChat -> LiteLLM -> Ollama (and
  # optionally hosted providers — see docker/litellm/config.yaml).
  # Meters every model call with per-key spend tracking, hard budgets
  # (max_budget) and RPM/TPM rate limits; admin dashboard at
  # http://localhost:4000/ui (log in with LITELLM_MASTER_KEY from .env).
  # LiteLLM routes, it does not run inference — Ollama stays the local
  # inference engine behind it.
  litellm:
    # The -database variant is the image LiteLLM documents for
    # Postgres-backed deployments (virtual keys, spend) — the base
    # image isn't guaranteed to ship the Prisma/DB pieces /key/generate
    # needs.
    image: ghcr.io/berriai/litellm-database:main-stable
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      litellm-postgres:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Encrypts provider credentials stored in LiteLLM's DB — distinct
      # from the master key so rotating one doesn't invalidate the other.
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: postgresql://litellm:${LITELLM_POSTGRES_PASSWORD}@litellm-postgres:5432/litellm
      # For the hosted claude-sonnet entry in docker/litellm/config.yaml
      # — the only place a provider key lives, so hosted calls stay
      # behind the gateway's metering. Blank = that model errors on
      # use; everything else is unaffected.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - type: bind
        source: ./docker/litellm/config.yaml
        target: /app/config.yaml
        read_only: true
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    networks:
      - default
      - ocr-net
    # 2g, not 1g: observed pinned at 1000MiB/1GiB under normal run
    # traffic — Prisma + proxy workers thrash at the boundary and every
    # request slows down.
    mem_limit: 2g
    healthcheck:
      # /health/readiness (not /health/liveliness): readiness includes
      # the DB connection, and litellm-init + LibreChat gate on this
      # healthcheck precisely because they need the DB-backed key
      # endpoints — liveness alone races LiteLLM's DB initialization.
      # Only db is checked: the accompanying status string differs
      # between LiteLLM's docs ("connected") and shipped images
      # ("healthy"), and db == "connected" is the part that matters.
      test: ["CMD", "python3", "-c", "import json,sys,urllib.request; r=json.load(urllib.request.urlopen('http://127.0.0.1:4000/health/readiness')); sys.exit(0 if r.get('db')=='connected' else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: provisions the dedicated virtual key LibreChat uses
  # against the gateway (docker/litellm/init-librechat-key.py). Least
  # privilege: the master key stays the admin credential and never
  # enters the librechat container — and LiteLLM enforces per-key
  # spend, max_budget and RPM/TPM limits on virtual keys, so this key
  # is where those ceilings attach (/key/update or the :4000/ui admin
  # dashboard). Safe to re-run; no-ops when the key already exists.
  litellm-init:
    # Same image as the litellm service (only python3 is used here) so
    # the stack pulls one LiteLLM image, not two.
    image: ghcr.io/berriai/litellm-database:main-stable
    depends_on:
      litellm:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_LIBRECHAT_KEY: ${LITELLM_LIBRECHAT_KEY}
      # Optional: provisions the OCR service's vision-description key
      # (same value the ocr service receives as GATEWAY_KEY) — without
      # this the gateway would reject the key and descriptions would
      # silently come back empty.
      LITELLM_OCR_KEY: ${LITELLM_OCR_KEY:-}
    volumes:
      - type: bind
        source: ./docker/litellm/init-librechat-key.py
        target: /app/init-librechat-key.py
        read_only: true
    entrypoint: ["python3", "/app/init-librechat-key.py"]
    mem_limit: 512m

  # The actual AI backend Nexus Scheduler's Worker calls (REQUIREMENTS
  # §2.1) — a real local install, not a mock, so job runs actually work
  # end to end. Minimal footprint: LibreChat's own default Compose setup
  # also includes Meilisearch (conversation search) and a RAG API +
  # pgvector (file-embedding search); neither is needed for the Agents
  # API this app calls, so both are omitted here and search is disabled
  # via SEARCH=false rather than left pointing at a service that isn't
  # running.
  librechat:
    image: registry.librechat.ai/danny-avila/librechat-dev:latest
    # default for the app/gateway, ocr-net for chat-upload OCR
    # (librechat.yaml ocr.strategy custom_ocr -> http://ocr:4200).
    networks:
      - default
      - ocr-net
    depends_on:
      librechat-mongo:
        condition: service_healthy
      litellm:
        condition: service_healthy
      litellm-init:
        condition: service_completed_successfully
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: mongodb://librechat-mongo:27017/LibreChat
      SEARCH: "false"
      # No provider API keys in this container — Claude/Anthropic is
      # served through the LiteLLM gateway (docker/litellm/config.yaml)
      # like the local models, so its calls get the same metering,
      # budgets and rate limits. Handing LibreChat the key directly
      # would let its built-in Anthropic endpoint bypass the gateway.
      #
      # Deliberately NOT setting ENDPOINTS to restrict the dropdown:
      # LibreChat's `agents` feature is itself one of the values in
      # that same endpoint enum, so doing that hid the entire Agent
      # Builder along with the providers it wasn't meant to filter.
      # Leaving ENDPOINTS unset means LibreChat shows its own default
      # set instead — a few more entries in the dropdown than intended,
      # but Agent creation actually works.
      #
      # Custom (non-built-in) endpoints — the local LiteLLM gateway
      # above (which routes on to Ollama) — are defined in the
      # bind-mounted librechat.yaml below; it references this variable
      # so the key never has to live in a committed file. This is the
      # dedicated virtual key litellm-init provisions, NOT the master
      # key: budgets/rate limits attach per virtual key, and the admin
      # credential stays out of this container.
      LITELLM_API_KEY: ${LITELLM_LIBRECHAT_KEY}
      CONFIG_PATH: /app/librechat.yaml
    volumes:
      - type: bind
        source: ./docker/librechat/.env
        target: /app/.env
      - type: bind
        source: ./docker/librechat/librechat.yaml
        target: /app/librechat.yaml
      - librechat-images:/app/client/public/images
      - librechat-uploads:/app/uploads
      - librechat-logs:/app/logs
    ports:
      - "${LIBRECHAT_PORT:-3080}:3080"
    mem_limit: 1536m


  # OCR + document understanding (#109): docling (layout/tables, OCR
  # pinned to Tesseract in code) + ocrmypdf (the single OCR pass and
  # the searchable-PDF audit artifact). Everything is baked into the
  # image — language data, layout models — and the service sits on an
  # internal-only network: it can be reached by the api/worker but has
  # no route out of the compose network at all, which is the airgap
  # claim enforced rather than assumed. The optional image-description
  # step talks to the litellm gateway (also on the internal network)
  # with its own virtual key; leave the key unset and it is skipped.
  ocr:
    build:
      context: ./docker/ocr
    networks:
      - ocr-net
    environment:
      IMAGE_DPI: ${IMAGE_DPI:-300}
      OCR_FILE_STORE_MAX_BYTES: ${OCR_FILE_STORE_MAX_BYTES:-268435456}
      # Hard ceiling on one extraction; a large scan on CPU can exceed the
      # 900s default. The remaining three are returned to callers as 413.
      OCR_MAX_PROCESS_SECONDS: ${OCR_MAX_PROCESS_SECONDS:-900}
      OCR_FILE_MAX_BYTES: ${OCR_FILE_MAX_BYTES:-15728640}
      OCR_PROCESS_MAX_FILES: ${OCR_PROCESS_MAX_FILES:-10}
      OCR_PROCESS_MAX_TOTAL_BYTES: ${OCR_PROCESS_MAX_TOTAL_BYTES:-52428800}
      GATEWAY_URL: http://litellm:4000
      GATEWAY_KEY: ${LITELLM_OCR_KEY:-}
      VISION_MODEL: ${OCR_VISION_MODEL:-}
      # Default for LibreChat chat uploads (the Mistral /v1/ocr path,
      # which carries no per-request describe flag). The worker's
      # scheduled-run path passes its own ?describe per call.
      OCR_DESCRIBE_IMAGES: ${OCR_DESCRIBE_IMAGES:-false}
      OCR_DESCRIBE_MIN_BUDGET_S: ${OCR_DESCRIBE_MIN_BUDGET_S:-60}
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: build
    command: ["npm", "run", "prisma:push", "--workspace=packages/shared"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 1g

  # Isolated PDF-rendering component (§2.5) — the only place in the
  # stack that runs headless Chromium. No ports published to the host;
  # only the api/worker services reach it, over the compose network.
  pdf-service:
    build:
      context: .
      dockerfile: packages/pdf-service/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 4100
      LOG_LEVEL: debug
      PDF_SERVICE_SHARED_SECRET: ${PDF_SERVICE_SHARED_SECRET}
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4100/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      API_KEY_ENCRYPTION_KEY: ${API_KEY_ENCRYPTION_KEY}
      APP_BASE_URL: http://localhost:${APP_PORT:-8080}
      OIDC_ISSUER_URL: http://keycloak:8080/realms/nexus-scheduler
      OIDC_CLIENT_ID: nexus-scheduler
      OIDC_REDIRECT_URI: http://localhost:${APP_PORT:-8080}/auth/callback
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      LIBRECHAT_BASE_URL: ${LIBRECHAT_BASE_URL}
      PDF_SERVICE_URL: http://pdf-service:4100
      PDF_SERVICE_SHARED_SECRET: ${PDF_SERVICE_SHARED_SECRET}
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      pdf-service:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    mem_limit: 1g

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    environment:
      NODE_ENV: development
      HEALTH_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_KEY_ENCRYPTION_KEY: ${API_KEY_ENCRYPTION_KEY}
      LIBRECHAT_BASE_URL: ${LIBRECHAT_BASE_URL}
      PDF_SERVICE_URL: http://pdf-service:4100
      PDF_SERVICE_SHARED_SECRET: ${PDF_SERVICE_SHARED_SECRET}
      LOG_LEVEL: debug
      # Dev-stack default, far below the code's own default of 25
      # (packages/worker/src/config.ts) — a CPU-only local model at a
      # few tokens/sec can't serve 25 concurrent runs anyway. Override
      # in .env if your machine can take more.
      GLOBAL_MAX_CONCURRENT_RUNS: ${GLOBAL_MAX_CONCURRENT_RUNS:-5}
      # OCR pipeline (#109) — the worker extracts attachment text here
      # before every agent call.
      OCR_SERVICE_URL: http://ocr:4200
      OCR_DESCRIBE_IMAGES: ${OCR_DESCRIBE_IMAGES:-false}
      OCR_EXTRACTED_TEXT_MAX_CHARS: ${OCR_EXTRACTED_TEXT_MAX_CHARS:-80000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      pdf-service:
        condition: service_healthy
      # The OCR service blocks on docling model load before uvicorn
      # listens; without this gate the worker could pick up persisted
      # attachment runs in that window and burn their retries on
      # connection errors.
      ocr:
        condition: service_healthy
      # And the OCR virtual key must exist at the gateway before any
      # run can ask for image descriptions — _describe_image is
      # deliberately best-effort, so a run racing the provisioner would
      # silently succeed WITHOUT descriptions rather than fail.
      litellm-init:
        condition: service_completed_successfully
    networks:
      - default
      - ocr-net
    mem_limit: 1g

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    mem_limit: 512m

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - api
      - frontend
    mem_limit: 128m

networks:
  # Internal-only: members can talk to each other, but the network has
  # no gateway out — the ocr service lives only here.
  ocr-net:
    internal: true

volumes:
  postgres-data:
  redis-data:
  librechat-mongo-data:
  librechat-images:
  librechat-uploads:
  librechat-logs:
  ollama-data:
  litellm-postgres-data:
