apiVersion: v2
name: nexus-scheduler
description: >-
  Web application for scheduling agentic AI tasks against LibreChat's
  Agents API. See REQUIREMENTS.md and ARCHITECTURE.md in the repo root.
type: application
version: 0.2.0
appVersion: "0.2.0"

# PostgreSQL/Redis are optional subcharts (REQUIREMENTS §9.1: "optionally
# including... as a subchart/dependency, or bring-your-own"). These are
# first-party, minimal subcharts vendored directly under charts/ in this
# repository (not Bitnami's, not fetched from any remote chart registry)
# — no `repository:` field below on purpose, since Helm resolves a
# dependency by name+version from the local charts/ directory when none
# is given. This means `helm install`/`helm package` never needs network
# access to stand up PostgreSQL/Redis, which a remote registry
# (including charts.bitnami.com) would rule out entirely in an
# air-gapped environment. Still only need the app's own container images
# mirrored into the internal registry (REQUIREMENTS §3/§9.1), same as
# every other component.
dependencies:
  - name: postgresql
    version: "0.1.0"
    condition: postgresql.enabled
  - name: redis
    version: "0.1.0"
    condition: redis.enabled
