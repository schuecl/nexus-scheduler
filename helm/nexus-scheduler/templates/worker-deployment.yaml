apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-scheduler.fullname" . }}-worker
  labels:
    {{- include "nexus-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus-scheduler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "nexus-scheduler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.worker.healthPort | quote }}
    spec:
      serviceAccountName: {{ include "nexus-scheduler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}-worker:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.worker.healthPort }}
          # See api-deployment.yaml's identical command/args block for
          # why DATABASE_URL/REDIS_URL are built here rather than set
          # directly as env vars.
          command: ["sh", "-c"]
          args:
            - |
              set -e
              {{ include "nexus-scheduler.exportDatabaseUrlSnippet" . }}
              {{ include "nexus-scheduler.exportRedisUrlSnippet" . }}
              exec "$@"
            - sh
            - node
            - packages/worker/dist/index.js
          env:
            - name: NODE_ENV
              value: "production"
            - name: HEALTH_PORT
              value: {{ .Values.worker.healthPort | quote }}
            - name: LOG_LEVEL
              value: "info"
            - name: LIBRECHAT_BASE_URL
              value: {{ .Values.librechat.baseUrl | quote }}
            - name: PDF_SERVICE_URL
              value: "http://{{ include "nexus-scheduler.fullname" . }}-pdf-service:{{ .Values.pdfService.port }}"
            {{- if .Values.ocr.serviceUrl }}
            # The OCR pipeline service (#109), deployed by the separate
            # helm/ocr chart; jobs with attachments run without extraction
            # (with a warning) when unset.
            - name: OCR_SERVICE_URL
              value: {{ .Values.ocr.serviceUrl | quote }}
            - name: OCR_DESCRIBE_IMAGES
              value: {{ .Values.ocr.describeImages | quote }}
            - name: OCR_EXTRACTED_TEXT_MAX_CHARS
              value: {{ int64 .Values.ocr.maxPromptChars | quote }}
            {{- end }}
            {{- if .Values.librechat.tls.caBundle }}
            # Node's fetch() (this app's HTTP client for every LibreChat
            # call) honors this process-wide with no application code
            # changes — see values.yaml's librechat.tls.caBundle comment.
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/nexus-scheduler/librechat-ca/ca.pem
            {{- end }}
            {{- if .Values.librechat.tls.insecureSkipVerify }}
            # DANGEROUS — see values.yaml's librechat.tls.insecureSkipVerify
            # comment. Disables TLS certificate validation entirely.
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            {{- end }}
            {{- include "nexus-scheduler.databaseEnv" . | nindent 12 }}
            {{- include "nexus-scheduler.redisEnv" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.appSecretName }}
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.worker.healthPort }} }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: {{ .Values.worker.healthPort }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.librechat.tls.caBundle }}
            - name: librechat-ca
              mountPath: /etc/nexus-scheduler/librechat-ca
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.librechat.tls.caBundle }}
        - name: librechat-ca
          configMap:
            name: {{ include "nexus-scheduler.fullname" . }}-librechat-ca
        {{- end }}
