apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-scheduler.fullname" . }}-worker
  labels:
    {{- include "nexus-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus-scheduler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "nexus-scheduler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "nexus-scheduler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}-worker:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.worker.healthPort }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: HEALTH_PORT
              value: {{ .Values.worker.healthPort | quote }}
            - name: LOG_LEVEL
              value: "info"
            - name: LIBRECHAT_BASE_URL
              value: {{ .Values.librechat.baseUrl | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.appSecretName }}
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.worker.healthPort }} }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: {{ .Values.worker.healthPort }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
