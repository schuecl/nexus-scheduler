{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nexus-scheduler.fullname" . }}
  labels:
    {{- include "nexus-scheduler.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.host }}]
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "nexus-scheduler.fullname" . }}-api
                port: { number: {{ .Values.api.port }} }
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "nexus-scheduler.fullname" . }}-api
                port: { number: {{ .Values.api.port }} }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "nexus-scheduler.fullname" . }}-frontend
                port: { number: 80 }
{{- end }}
