apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-scheduler.fullname" . }}-pdf-service
  labels:
    {{- include "nexus-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-service
spec:
  replicas: {{ .Values.pdfService.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus-scheduler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pdf-service
  template:
    metadata:
      labels:
        {{- include "nexus-scheduler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pdf-service
      annotations:
        # No prometheus.io/scrape here, unlike api and worker. This pod's
        # NetworkPolicy admits only this release's api and worker (§2.5), so
        # an annotation-scraping Prometheus is refused at the network — the
        # annotation would advertise a target that can never answer, and a
        # permanently-down target pages someone about a policy decision.
        #
        # That stays true even with pdfService.metrics.enabled: the
        # annotation path would point the scrape at the render port, which
        # remains api/worker-only by design. Scraping this pod goes through
        # the dedicated metrics port (issue #118) — the Service's `metrics`
        # port, admitted by pdfService.metrics.scrapeFrom and targeted by
        # the ServiceMonitor.
    spec:
      serviceAccountName: {{ include "nexus-scheduler.serviceAccountName" . }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: pdf-service
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}-pdf-service:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.pdfService.port }}
            {{- if .Values.pdfService.metrics.enabled }}
            - containerPort: {{ .Values.pdfService.metrics.port }}
            {{- end }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.pdfService.port | quote }}
            - name: LOG_LEVEL
              value: "info"
            {{- if .Values.pdfService.metrics.enabled }}
            - name: PDF_SERVICE_METRICS_PORT
              value: {{ .Values.pdfService.metrics.port | quote }}
            {{- end }}
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.pdfService.port }} }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: {{ .Values.pdfService.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.pdfService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
