apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-scheduler.fullname" . }}-pdf-service
  labels:
    {{- include "nexus-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-service
spec:
  replicas: {{ .Values.pdfService.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus-scheduler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pdf-service
  template:
    metadata:
      labels:
        {{- include "nexus-scheduler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pdf-service
      annotations:
        # No prometheus.io/scrape here, unlike api and worker. This pod's
        # NetworkPolicy admits only this release's api and worker (§2.5), so
        # an annotation-scraping Prometheus is refused at the network — the
        # annotation would advertise a target that can never answer, and a
        # permanently-down target pages someone about a policy decision.
        #
        # It is not an oversight and not a missing feature: /metrics and
        # POST /render/* are the same listener on the same port, so nothing
        # can admit the scrape without also admitting anything in that
        # namespace to drive Chromium. Collecting it needs a dedicated
        # metrics port — an application change, tracked in schuecl#118.
    spec:
      serviceAccountName: {{ include "nexus-scheduler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: pdf-service
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}-pdf-service:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.pdfService.port }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.pdfService.port | quote }}
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.pdfService.port }} }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: {{ .Values.pdfService.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.pdfService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
