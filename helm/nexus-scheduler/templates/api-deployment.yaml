apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-scheduler.fullname" . }}-api
  labels:
    {{- include "nexus-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus-scheduler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "nexus-scheduler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.api.port | quote }}
    spec:
      serviceAccountName: {{ include "nexus-scheduler.serviceAccountName" . }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.api.port }}
          # DATABASE_URL/REDIS_URL aren't set directly as env vars (see
          # nexus-scheduler.databaseEnv/redisEnv below) — they're built
          # here from the discrete pieces via a properly URL-encoding
          # script, then the original image CMD is exec'd. See
          # _helpers.tpl's exportDatabaseUrlSnippet/exportRedisUrlSnippet
          # for why this can't just be Kubernetes' own $(VAR) expansion.
          command: ["sh", "-c"]
          args:
            - |
              set -e
              {{ include "nexus-scheduler.exportDatabaseUrlSnippet" . }}
              {{ include "nexus-scheduler.exportRedisUrlSnippet" . }}
              exec "$@"
            - sh
            - node
            - packages/api/dist/index.js
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: LOG_LEVEL
              value: "info"
            {{- if .Values.oidc.issuerUrl }}
            # Rendered only when SSO is configured: the app's env schema
            # validates these as URLs, so unconditional empty strings
            # crashlooped every API pod despite values.yaml documenting
            # "left empty, SSO login is unavailable" (issue #139).
            - name: OIDC_ISSUER_URL
              value: {{ .Values.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            - name: OIDC_REDIRECT_URI
              value: {{ .Values.oidc.redirectUri | quote }}
            {{- end }}
            - name: LIBRECHAT_BASE_URL
              value: {{ .Values.librechat.baseUrl | quote }}
            - name: PDF_SERVICE_URL
              value: "http://{{ include "nexus-scheduler.fullname" . }}-pdf-service:{{ .Values.pdfService.port }}"
            {{- if .Values.librechat.tls.caBundle }}
            # Node's fetch() (this app's HTTP client for every LibreChat
            # call) honors this process-wide with no application code
            # changes — see values.yaml's librechat.tls.caBundle comment.
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/nexus-scheduler/librechat-ca/ca.pem
            {{- end }}
            {{- if .Values.librechat.tls.insecureSkipVerify }}
            # DANGEROUS — see values.yaml's librechat.tls.insecureSkipVerify
            # comment. Disables TLS certificate validation entirely.
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            {{- end }}
            {{- include "nexus-scheduler.databaseEnv" . | nindent 12 }}
            {{- include "nexus-scheduler.redisEnv" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.appSecretName }}
            {{- if .Values.oidc.issuerUrl }}
            # Same gate as the OIDC env block above — without SSO there
            # is no OIDC_CLIENT_SECRET to mount, and requiring the
            # Secret to exist anyway made "OIDC disabled" installs fail.
            - secretRef:
                name: {{ .Values.secrets.oidcSecretName }}
            {{- end }}
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.api.port }} }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: {{ .Values.api.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.librechat.tls.caBundle }}
            - name: librechat-ca
              mountPath: /etc/nexus-scheduler/librechat-ca
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.librechat.tls.caBundle }}
        - name: librechat-ca
          configMap:
            name: {{ include "nexus-scheduler.fullname" . }}-librechat-ca
        {{- end }}
