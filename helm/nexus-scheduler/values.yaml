# Default values for nexus-scheduler.
# Override per-environment; do not edit defaults for a specific
# deployment — use -f/--set at install time instead.

image:
  # In an air-gapped deployment, point this at the internal/offline
  # registry the images were relocated to (REQUIREMENTS §3/§9.1).
  registry: "registry.example.internal"
  repository: "nexus-scheduler"
  tag: "0.1.9"
  pullPolicy: IfNotPresent

api:
  replicaCount: 2
  port: 3000
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }

worker:
  replicaCount: 2
  healthPort: 3001
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
  # §2.1: worker replica count is the actual lever for concurrency beyond
  # the in-process GLOBAL_MAX_CONCURRENT_RUNS limit.

# Isolated PDF-rendering component (§2.5) — the only place that launches
# headless Chromium, hence the meaningfully higher memory request/limit
# than api/worker now need. See pdf-service-networkpolicy.yaml for the
# "no egress" enforcement this split enables.
pdfService:
  replicaCount: 2
  port: 4100
  # Dedicated metrics listener (issue #118). The render port's NetworkPolicy
  # admits only api/worker, and an L3/L4 rule cannot tell GET /metrics from
  # POST /render/* — so on a shared port, admitting a scraper means admitting
  # it to Chromium. Enabling this starts a second, scrape-only listener in the
  # pod (it cannot render), exposes it as the Service's `metrics` port, and
  # admits `scrapeFrom` peers to that port only; the render port's
  # api/worker-only rule is untouched. With observability.serviceMonitor.enabled
  # also on, the chart then emits a pdf-service ServiceMonitor targeting it.
  metrics:
    enabled: false
    port: 9464
    # NetworkPolicyPeer list (verbatim) allowed to reach the metrics port.
    # Empty means the listener runs but nothing is admitted to it — set this
    # to your scraper's identity, e.g. kube-prometheus-stack in `monitoring`:
    #   scrapeFrom:
    #     - namespaceSelector:
    #         matchLabels: { kubernetes.io/metadata.name: monitoring }
    #       podSelector:
    #         matchLabels: { app.kubernetes.io/name: prometheus }
    scrapeFrom: []
  resources:
    requests: { cpu: "100m", memory: "384Mi" }
    limits: { cpu: "1", memory: "1Gi" }

# The OCR pipeline service (#109), deployed by the separate helm/ocr
# chart. Point serviceUrl at its Service (e.g.
# http://ocr.ocr-namespace.svc:4200) and add this release's namespace to
# that chart's networkPolicy.clientNamespaces, or its ingress policy
# will drop the worker's calls. Empty = jobs with attachments run
# without extraction, with a warning per run.
ocr:
  serviceUrl: ""
  describeImages: "false"
  # Complete user-prompt ceiling for runs with attachments. 80k chars is
  # roughly 20k tokens, leaving headroom in the bundled 32k-context model.
  maxPromptChars: 80000

frontend:
  replicaCount: 2
  port: 8080
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "250m", memory: "128Mi" }

# The target environment already runs nginx as a reverse proxy in front
# of the application (REQUIREMENTS §9.1) — this chart does not deploy
# nginx. Enable `ingress` only if the cluster's existing proxy expects to
# reach this app via an Ingress resource rather than a Service directly.
ingress:
  enabled: false
  className: ""
  host: "nexus-scheduler.example.mil"
  # Attachment uploads (#109) are base64 JSON up to ~20MB; ingress-nginx
  # would otherwise cut them off at its 1m default. Adjust or replace for
  # other controllers.
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 21m
  tls:
    enabled: false
    secretName: ""

# Bundled by default — a first-party, minimal single-instance subchart
# vendored at charts/postgresql (not Bitnami's, see Chart.yaml), so
# `helm install` never needs network access to stand this up. Set
# `enabled: false` to bring your own external instance instead and fill
# in `externalDatabase` below (host/port only — credentials still come
# from auth.existingSecretName below either way).
postgresql:
  enabled: true
  auth:
    # Pre-existing Secret (never created by this chart, must exist
    # before install) holding this Postgres instance's credentials.
    # Expected keys: `username`, `password`, `database`. Used both to
    # boot the bundled instance (when enabled above) and by the app
    # itself to build its own DATABASE_URL (see templates/_helpers.tpl's
    # databaseEnv/exportDatabaseUrlSnippet) — one secret to manage
    # instead of two that had to be kept in sync by hand. The URL is
    # assembled at container start with proper URL-encoding, so any
    # character is safe to use in username/password.
    existingSecretName: "nexus-scheduler-postgresql"
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: "" # empty = cluster default StorageClass

# Bundled by default — same rationale as postgresql above, vendored at
# charts/redis. Set `enabled: false` to bring your own and fill in
# `externalRedis` below.
redis:
  enabled: true
  auth:
    # Pre-existing Secret (never created by this chart) holding this
    # Redis instance's password. Expected key: `password`. Same
    # "one secret, used both to boot the bundled instance and to build
    # the app's own REDIS_URL, safely URL-encoded" rationale as
    # postgresql.auth above.
    existingSecretName: "nexus-scheduler-redis"
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: "" # empty = cluster default StorageClass

externalDatabase:
  # Used only when postgresql.enabled=false. Only host/port live here —
  # they're not secret; credentials still come from
  # postgresql.auth.existingSecretName above either way.
  host: ""
  port: 5432

externalRedis:
  # Used only when redis.enabled=false. See externalDatabase above for
  # why only host/port live here.
  host: ""
  port: 6379

# Names of pre-existing Kubernetes Secrets this chart mounts as env vars.
# None of these are created by the chart — REQUIREMENTS §9.1: "never
# baked into images" and never generated by the chart either, unlike the
# local Compose stack's randomly-generated dev secrets. For a dev
# cluster, scripts/create-dev-secrets.sh generates all four with valid
# formats. Key formats matter: the floors below are enforced by the
# api/worker's own config validation, and a too-short value doesn't
# degrade — it crashloops the pod with "Invalid environment
# configuration" (issue #147).
secrets:
  # Keys expected in this Secret:
  #   SESSION_SECRET            — at least 32 characters
  #   API_KEY_ENCRYPTION_KEY    — at least 32 characters
  #   BOOTSTRAP_ADMIN_EMAIL     — a valid email address
  #   BOOTSTRAP_ADMIN_PASSWORD  — at least 12 characters
  # (BOOTSTRAP_* is the built-in break-glass admin, REQUIREMENTS §4 —
  # its password is re-synced from this value on every API pod start,
  # so rotating it here and rolling the Deployment is how an operator
  # recovers admin access.)
  appSecretName: "nexus-scheduler-app"
  # Keys expected: OIDC_CLIENT_SECRET. Only mounted when oidc.issuerUrl is
  # set — an SSO-less install does not need this Secret to exist at all
  # (api-deployment.yaml gates the secretRef on the same condition).
  oidcSecretName: "nexus-scheduler-oidc"
  # DATABASE_URL/REDIS_URL are no longer separate pre-composed secrets —
  # the app builds both itself at pod start from
  # postgresql.auth.existingSecretName / redis.auth.existingSecretName
  # above (see templates/_helpers.tpl's databaseEnv/redisEnv and
  # exportDatabaseUrlSnippet/exportRedisUrlSnippet).
  # SMTP (§5) is NOT a K8s Secret — it's admin-configured at runtime via
  # the Admin UI and stored (password encrypted) in the app's own
  # database, the same as branding/classification-banner settings.

oidc:
  # Base URL of the OIDC issuer (e.g. a Keycloak realm,
  # https://keycloak.example.mil/realms/nexus-scheduler) used for
  # discovery. REQUIREMENTS §4: CAC/PIV smart-card auth happens entirely
  # upstream inside the IdP — Nexus Scheduler never sees a certificate,
  # only the resulting OIDC token. Left empty, SSO login is unavailable
  # and only local/break-glass admin login works.
  issuerUrl: ""
  # Also doubles as the Keycloak *client* whose role-mapping claim gets
  # read at every login — see the roles note below.
  clientId: "nexus-scheduler"
  # Must exactly match the redirect URI registered on this client in the
  # IdP, and is always this app's own base URL + `/auth/callback`
  # (packages/api/src/app.ts mounts the OIDC callback route at
  # `/auth/callback`). E.g. for a deployment reachable at
  # https://scheduler.mpnexus.army.ms.us:
  #   https://scheduler.mpnexus.army.ms.us/auth/callback
  redirectUri: ""
  # --- Expected claims on the OIDC ID token this app reads ---
  # (packages/api/src/routes/auth.ts, packages/api/src/auth/oidc.ts)
  #
  # User fields — standard OIDC claims, requested via the `openid email
  # profile` scopes. All except `email` are optional: a missing one just
  # leaves that field null rather than failing login.
  #   email        (required) -> User.email — login fails with a 400 if
  #                the ID token has no email claim at all.
  #   given_name   (optional) -> User.givenName
  #   family_name  (optional) -> User.familyName
  #   name         (optional) -> User.displayName
  #
  # Role mapping — Keycloak's *client* roles claim (a Client Role on the
  # `clientId` client above, not a Realm Role and not a generic "roles"
  # claim):
  #   resource_access.<clientId>.roles: ["<role>", ...]
  # Matched case-insensitively against this app's three roles — ADMIN,
  # EDITOR, VIEW (packages/shared/src/roles.ts) — and re-evaluated on
  # every login, so Keycloak stays the source of truth going forward,
  # not just at first account creation. No recognized role present ->
  # falls back to VIEW (least privileged), never a more powerful role by
  # default.

librechat:
  baseUrl: ""
  tls:
    # PEM-encoded custom CA certificate(s) to trust when this app calls
    # LibreChat over HTTPS — for environments (like this one) where
    # LibreChat's cert chains up to an internal/custom CA rather than a
    # publicly trusted one. Paste the full chain here, or supply it at
    # install time with `--set-file librechat.tls.caBundle=ca-bundle.pem`
    # instead of editing this file. Left empty (the default), no
    # ConfigMap is created and Node's normal public trust store is used
    # unmodified. Not a Secret: CA certificates are public by
    # definition, so this is rendered into a ConfigMap
    # (see templates/librechat-ca-configmap.yaml) mounted into the api
    # and worker containers, whose path is exported via the
    # NODE_EXTRA_CA_CERTS environment variable — Node's fetch()
    # (everything this app uses to call LibreChat) honors that
    # process-wide with no application code changes needed.
    caBundle: ""
    # DANGEROUS: disables ALL TLS certificate validation for every
    # outbound HTTPS call this app makes (not narrowly scoped to
    # LibreChat), via NODE_TLS_REJECT_UNAUTHORIZED=0. Intended only for
    # temporarily testing against a LibreChat instance whose cert chain
    # isn't sorted out yet — never enable this in a production install,
    # and prefer caBundle above once you have the real CA cert(s).
    insecureSkipVerify: false

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  # Numeric on purpose: the app images declare their user by NAME
  # (USER nexus, uid 999), and kubelet refuses runAsNonRoot when it
  # cannot prove a named user is non-root — every pod failed with
  # CreateContainerConfigError on a real cluster (issue #139).
  runAsUser: 999
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Passthrough for every pod's dnsConfig (issue #215). Unset by default —
# no behavior change. On a cluster whose nodes carry a corporate search
# domain that resolves a wildcard (common on air-gapped/hardened
# clusters), the default ndots:5 makes every outbound hostname with
# fewer than 5 dots (registry.example.com, raw.githubusercontent.com,
# ...) tried against the search list FIRST — silently hijacking it to
# an internal host instead of the real one, surfacing as a confusing
# TLS certificate error rather than a DNS error. ndots:1 is safe here:
# in-cluster Service names are still resolved correctly through the
# explicit search entries regardless of ndots.
#   dnsConfig:
#     options:
#       - name: ndots
#         value: "1"
dnsConfig: {}

# Observability. The api, worker and pdf-service all expose Prometheus metrics
# (the frontend is an nginx serving static assets and has none), but only the
# api and worker can be collected in Kubernetes — pdf-service is unreachable by
# design, see serviceMonitor below. This section is about who does the
# collecting.
#
# Note what is deliberately absent: this chart does not ship Alloy, Mimir, Loki
# or Grafana. A cluster that runs this app almost certainly already runs a
# monitoring stack, and an app chart bringing its own would duplicate storage,
# compete for scrape ownership, and make this chart responsible for upgrading
# four components it does not own. The repo's compose observability overlay
# (issue #103) exists for local development, where none of that is true.
observability:
  serviceMonitor:
    # Off by default: a ServiceMonitor needs the Prometheus Operator's CRD, and
    # applying one to a cluster without it fails outright. Enabling this is a
    # statement that the CRD is installed.
    #
    # Pick ONE discovery path. Without the Operator, the pod annotations already
    # on the api and worker deployments (prometheus.io/scrape) cover the classic
    # annotation-based scrape config and nothing here is needed. Neither path
    # reaches pdf-service — see below. Enabling this *as well* as an annotation-based Prometheus means
    # both scrape the same pods: the series differ only by `job`, so nothing
    # errors — the graphs just quietly double wherever a query sums across
    # jobs. The chart cannot detect the annotation path (it lives in
    # Prometheus's own config), so this is the operator's call to make.
    enabled: false
    # Matches the app's own scrape interval in the compose stack. The
    # queue_depth gauge queries Redis on every scrape, so this is not free —
    # halving it doubles that load for little extra resolution.
    interval: 15s
    scrapeTimeout: 10s
    # Extra labels on the ServiceMonitor itself. Most Prometheus Operator
    # installs select ServiceMonitors by label (`release: kube-prometheus-stack`
    # is the common one) and will silently ignore this object without it —
    # which looks exactly like the app not exposing metrics.
    labels: {}
    # pdf-service is scraped only when pdfService.metrics.enabled is also on:
    # its render port stays api/worker-only (a NetworkPolicy cannot tell
    # GET /metrics from POST /render/* on a shared listener), so the scrape
    # goes through the dedicated scrape-only listener that flag starts — see
    # the pdfService.metrics block above. api and worker are scraped normally
    # either way.
    #
    # Applied at ingestion, before storage — the place to drop a metric family
    # this cluster does not want to pay to keep, or to rewrite a label whose
    # cardinality is a problem in your deployment specifically. Example:
    #   metricRelabelings:
    #     - sourceLabels: [__name__]
    #       regex: 'nodejs_gc_duration_seconds.*'
    #       action: drop
    metricRelabelings: []
