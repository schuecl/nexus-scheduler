# Default values for nexus-scheduler.
# Override per-environment; do not edit defaults for a specific
# deployment — use -f/--set at install time instead.

image:
  # In an air-gapped deployment, point this at the internal/offline
  # registry the images were relocated to (REQUIREMENTS §3/§9.1).
  registry: "registry.example.internal"
  repository: "nexus-scheduler"
  tag: "0.1.0"
  pullPolicy: IfNotPresent

api:
  replicaCount: 2
  port: 3000
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

worker:
  replicaCount: 2
  healthPort: 3001
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits: { cpu: "1", memory: "1Gi" }
  # §2.1: worker replica count is the actual lever for concurrency beyond
  # the in-process GLOBAL_MAX_CONCURRENT_RUNS limit.

frontend:
  replicaCount: 2
  port: 8080
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "250m", memory: "128Mi" }

# The target environment already runs nginx as a reverse proxy in front
# of the application (REQUIREMENTS §9.1) — this chart does not deploy
# nginx. Enable `ingress` only if the cluster's existing proxy expects to
# reach this app via an Ingress resource rather than a Service directly.
ingress:
  enabled: false
  className: ""
  host: "nexus-scheduler.example.mil"
  tls:
    enabled: false
    secretName: ""

postgresql:
  enabled: true # set false to bring your own and fill externalDatabase below
  auth:
    username: nexus
    database: nexus_scheduler
    existingSecret: "nexus-scheduler-postgresql" # must be created out-of-band, never committed

redis:
  enabled: true # set false to bring your own and fill externalRedis below
  auth:
    enabled: true
    existingSecret: "nexus-scheduler-redis" # must be created out-of-band

externalDatabase:
  # Used only when postgresql.enabled=false.
  host: ""
  port: 5432

externalRedis:
  # Used only when redis.enabled=false.
  host: ""
  port: 6379

# Names of pre-existing Kubernetes Secrets this chart mounts as env vars.
# None of these are created by the chart — REQUIREMENTS §9.1: "never
# baked into images" and never generated by the chart either, unlike the
# local Compose stack's randomly-generated dev secrets.
#
# Composing a DATABASE_URL/REDIS_URL from separate host/user/password
# pieces inside Helm templates is fragile (see Bitnami subchart secret
# key-name churn across versions). Simpler and more robust: whatever
# out-of-band process provisions `appSecretName` (a script, a secrets
# operator, a person) writes the *complete* connection strings into it
# directly, whether the DB/Redis came from the subcharts below or are
# bring-your-own.
secrets:
  # Keys expected in this Secret: SESSION_SECRET, API_KEY_ENCRYPTION_KEY,
  # DATABASE_URL, REDIS_URL.
  appSecretName: "nexus-scheduler-app"
  # Keys expected: OIDC_CLIENT_SECRET.
  oidcSecretName: "nexus-scheduler-oidc"
  # Keys expected: SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD.
  smtpSecretName: "nexus-scheduler-smtp"

oidc:
  issuerUrl: ""
  clientId: "nexus-scheduler"
  redirectUri: ""

librechat:
  baseUrl: ""

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
