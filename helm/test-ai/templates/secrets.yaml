# Release-generated credentials, preserved across upgrades via lookup —
# the REQUIREMENTS §9.2 posture (random per install, never committed)
# carried over from generate-local-env.sh. Point litellm.existingSecret
# / librechat.existingSecret at your own Secrets to manage them
# externally instead.
{{- if not .Values.litellm.existingSecret }}
{{- $name := printf "%s-litellm-keys" (include "test-ai.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "test-ai.labels" . | nindent 4 }}
  annotations:
    # Survive `helm uninstall`: the StatefulSet PVCs are retained by
    # Kubernetes' default, so deleting this Secret would strand the
    # retained Postgres data (and LibreChat's CREDS-encrypted rows)
    # behind freshly generated credentials on reinstall. The lookup in
    # test-ai.stableSecret then finds and reuses these values.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  masterKey: {{ include "test-ai.stableSecret" (dict "ns" .Release.Namespace "secret" $name "key" "masterKey") | quote }}
  saltKey: {{ include "test-ai.stableSecret" (dict "ns" .Release.Namespace "secret" $name "key" "saltKey") | quote }}
  librechatKey: {{ include "test-ai.stableSecret" (dict "ns" .Release.Namespace "secret" $name "key" "librechatKey") | quote }}
  postgresPassword: {{ include "test-ai.stableSecret" (dict "ns" .Release.Namespace "secret" $name "key" "postgresPassword") | quote }}
{{- end }}
{{- if not .Values.librechat.existingSecret }}
{{- $name := printf "%s-librechat-keys" (include "test-ai.fullname" .) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "test-ai.labels" . | nindent 4 }}
  annotations:
    # Survive `helm uninstall`: the StatefulSet PVCs are retained by
    # Kubernetes' default, so deleting this Secret would strand the
    # retained Postgres data (and LibreChat's CREDS-encrypted rows)
    # behind freshly generated credentials on reinstall. The lookup in
    # test-ai.stableSecret then finds and reuses these values.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  jwtSecret: {{ include "test-ai.stableSecret" (dict "ns" .Release.Namespace "secret" $name "key" "jwtSecret") | quote }}
  jwtRefreshSecret: {{ include "test-ai.stableSecret" (dict "ns" .Release.Namespace "secret" $name "key" "jwtRefreshSecret") | quote }}
  credsKey: {{ include "test-ai.stableHexSecret" (dict "ns" .Release.Namespace "secret" $name "key" "credsKey" "len" 64) | quote }}
  credsIv: {{ include "test-ai.stableHexSecret" (dict "ns" .Release.Namespace "secret" $name "key" "credsIv" "len" 32) | quote }}
{{- end }}
