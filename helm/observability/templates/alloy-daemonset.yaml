# DaemonSet rather than Deployment: log collection via the Kubernetes
# API is per-pod, but kubelet cAdvisor scraping and any future node
# exporters are per-node — one Alloy on each node keeps both local.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "observability.fullname" . }}-alloy
  labels:
    app.kubernetes.io/name: alloy
    {{- include "observability.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy
        {{- include "observability.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/alloy-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "observability.fullname" . }}-alloy
      {{- include "observability.imagePullSecrets" . | nindent 6 }}
      {{- include "observability.scheduling" . | nindent 6 }}
      securityContext:
        # The image runs as its own non-root user; fsGroup makes the
        # storage emptyDir writable for it (same class of failure the
        # PVC-backed pods had).
        {{- include "observability.podSecurityContext" (dict "root" $ "uid" .Values.alloy.securityContext.runAsUser) | nindent 8 }}
      containers:
        - name: alloy
          image: {{ include "observability.image" (dict "root" $ "image" .Values.alloy.image) }}
          env:
            # Scopes discovery to this node — see the keep rules in the
            # config; a DaemonSet without this collects cluster-wide, N
            # times over.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
          ports:
            - name: http
              containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy/data
            {{- if .Values.alloy.hostMetrics }}
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-root
              mountPath: /host/root
              readOnly: true
              # No mountPropagation: it requires a shared/slave host
              # mount, which some runtimes (Docker Desktop's VM among
              # them) refuse outright — the cost is only that mounts
              # created after pod start aren't seen by the filesystem
              # collector.
            {{- end }}
          resources:
            {{- toYaml .Values.alloy.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            {{- include "observability.containerSecurityContext" (dict "root" $) | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "observability.fullname" . }}-alloy-config
        - name: data
          emptyDir: {}
        {{- if .Values.alloy.hostMetrics }}
        - name: host-proc
          hostPath: {path: /proc}
        - name: host-sys
          hostPath: {path: /sys}
        - name: host-root
          hostPath: {path: /}
        {{- end }}
