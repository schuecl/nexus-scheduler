{{- if .Values.litellmExporter.enabled }}
{{- if not .Values.litellmExporter.existingSecret }}
{{- fail "litellmExporter.enabled requires litellmExporter.existingSecret (a Secret with key `masterKey`) — the chart never stores the gateway admin key in values" }}
{{- end }}
# Bridges the LiteLLM gateway's spend log into Prometheus — the same
# stdlib script the Compose overlay runs, shipped as a ConfigMap and
# executed by the gateway's own image (python3, no extra image to
# mirror in an air-gapped registry).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability.fullname" . }}-litellm-exporter
  labels:
    {{- include "observability.labels" . | nindent 4 }}
data:
  exporter.py: |-
    {{- .Files.Get "config/litellm-exporter.py" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observability.fullname" . }}-litellm-exporter
  labels:
    app.kubernetes.io/name: litellm-exporter
    {{- include "observability.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-exporter
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-exporter
        {{- include "observability.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9099"
    spec:
      containers:
        - name: exporter
          image: {{ include "observability.image" (dict "root" $ "image" .Values.litellmExporter.image) }}
          command: ["python3", "/app/exporter.py"]
          env:
            - name: LITELLM_URL
              value: {{ .Values.litellmExporter.litellmUrl | quote }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.litellmExporter.existingSecret }}
                  key: masterKey
          ports:
            - name: http
              containerPort: 9099
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
          resources:
            {{- toYaml .Values.litellmExporter.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: script
          configMap:
            name: {{ include "observability.fullname" . }}-litellm-exporter
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability.fullname" . }}-litellm-exporter
  labels:
    {{- include "observability.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: litellm-exporter
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 9099
      targetPort: http
{{- end }}
