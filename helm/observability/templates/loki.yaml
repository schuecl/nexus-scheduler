{{- define "observability.loki.config" -}}
auth_enabled: false
server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
limits_config:
  retention_period: {{ .Values.loki.retention }}
  allow_structured_metadata: true
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
{{- end }}
# Loki single-binary on a PVC — same scope rationale as Mimir.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability.fullname" . }}-loki-config
  labels:
    {{- include "observability.labels" . | nindent 4 }}
data:
  loki.yaml: |
{{ include "observability.loki.config" . | trim | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "observability.fullname" . }}-loki
  labels:
    app.kubernetes.io/name: loki
    {{- include "observability.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "observability.fullname" . }}-loki
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
        {{- include "observability.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3100"
        checksum/config: {{ include "observability.loki.config" . | sha256sum | trunc 32 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: loki
          image: {{ include "observability.image" (dict "root" $ "image" .Values.loki.image) }}
          args: ["-config.file=/etc/loki/loki.yaml"]
          ports:
            - name: http
              containerPort: 3100
          readinessProbe:
            httpGet: {path: /ready, port: http}
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/loki
              readOnly: true
            - name: data
              mountPath: /loki
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "observability.fullname" . }}-loki-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.loki.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.loki.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability.fullname" . }}-loki
  labels:
    {{- include "observability.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 3100
      targetPort: http
