# Deployment profile: one replica of everything, filesystem storage on
# PVCs. That is the point — this chart exists for air-gapped and
# small clusters with no monitoring stack at all, where "some
# observability, owned and upgraded deliberately" beats "none". It is
# not an HA metrics platform, and it does not try to compete with a
# real Prometheus/Grafana install (if you have one, use the app chart's
# observability.serviceMonitor values and skip this chart).

# Air-gap note: every image below takes an optional digest. In a
# mirrored-registry environment, set registry to your mirror and pin
# digests — tags are convenience for connected dev clusters only.
# `helm template --set global.imageRegistry=registry.example.internal`
global:
  # Prepended to every image repository below when set (mirror hostname,
  # no trailing slash). Repositories that already carry a registry host
  # are left alone, so setting this never produces mirror/ghcr.io/... .
  imageRegistry: ""
  # Pull secret(s) for an authenticated mirror. Applied to every pod in
  # this chart.
  imagePullSecrets: []
  # Emitted as `seccompProfile.type` on every pod and container. Pod
  # Security Admission "restricted" — the default on TKG and many
  # hardened clusters — rejects any workload without it. Blank it only
  # if your policy engine forbids the field outright.
  seccompProfile: RuntimeDefault
  # Applied to all three PVCs when set. Leave empty to use whatever the
  # cluster's default StorageClass is: this chart deliberately does not
  # pin a class, because the right one differs on every distribution.
  # If the cluster has NO default class, install fails fast with the
  # list of classes that do exist rather than leaving pods Pending.
  storageClassName: ""
  # Applied to every pod in this chart. tolerations matter most for the
  # Alloy DaemonSet: on Tanzu (and most managed distributions) control-
  # plane nodes are tainted, so without a toleration those nodes get no
  # Alloy pod and contribute no metrics and no logs — silently.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  priorityClassName: ""
  # Applied to every pod in this chart. See templates/_helpers.tpl's
  # observability.dnsConfig comment (issue #215) for why ndots:1 is the
  # usual fix on a cluster with a wildcard corporate search domain:
  #   dnsConfig:
  #     options:
  #       - name: ndots
  #         value: "1"
  dnsConfig: {}

alloy:
  image:
    repository: grafana/alloy
    tag: v1.18.0
    digest: ""  # "sha256:..." — takes precedence over tag when set
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {memory: 512Mi}
  # The namespaces where the workloads to observe run — typically the
  # app chart's and the test-ai chart's, since all three charts are
  # deliberately independent installs. Alloy scrapes any pod in these
  # namespaces (plus its own) carrying prometheus.io/scrape
  # annotations, and tails their logs; no per-service list to
  # maintain. appNamespace (singular) is still honoured for
  # compatibility.
  appNamespaces: []
  appNamespace: ""
  # Scrape each node's kubelet cAdvisor endpoint for the per-container
  # CPU/memory panels. Works on every conformant cluster; needs the
  # RBAC this chart installs.
  kubeletCadvisor: true
  # Run Alloy's embedded unix exporter against the node's /proc,/sys,/
  # (read-only hostPath mounts) — feeds the Host dashboard's node_*
  # panels, mirroring the Compose stack's host job. Disable if node
  # metrics already come from elsewhere.
  hostMetrics: true
  # The UID baked into the upstream image. Overridable because a PSP or
  # policy engine that pins runAsUser to a range will reject anything
  # outside it, and there is otherwise no way to move it.
  securityContext:
    runAsUser: 473

mimir:
  image:
    repository: grafana/mimir
    tag: "3.1.3"
    digest: ""
  persistence:
    # false runs on an emptyDir instead of a PVC — for clusters with no
    # dynamic provisioning at all. Metrics do not survive a restart.
    enabled: true
    size: 10Gi
    # Empty means "use the cluster's default StorageClass". Nothing is
    # pinned here on purpose; see global.storageClassName.
    storageClassName: ""
  securityContext:
    runAsUser: 10001
  # Metric retention before blocks are deleted.
  retention: 15d
  resources:
    requests: {cpu: 250m, memory: 512Mi}
    limits: {memory: 1Gi}

loki:
  image:
    repository: grafana/loki
    tag: "3.7.3"
    digest: ""
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
  securityContext:
    runAsUser: 10001
  retention: 168h
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {memory: 512Mi}

grafana:
  image:
    repository: grafana/grafana
    tag: "13.1.0"
    digest: ""
  # Unlike the Compose overlay (anonymous admin, dev-only), Kubernetes
  # installs get a real admin login. Set adminPassword, or leave empty
  # to have the chart generate one into a Secret (kubectl get secret
  # <release>-grafana-admin -o jsonpath='{.data.password}' | base64 -d).
  adminUser: admin
  adminPassword: ""
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
  securityContext:
    runAsUser: 472
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
    className: ""
    host: grafana.example.internal
    tls: []
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {memory: 512Mi}

# Database integrations for the Infrastructure dashboard's Postgres and
# Redis panels — a separate single-replica Deployment, NOT part of the
# Alloy DaemonSet (one exporter per database, not one per node, or
# every node scrapes the same server). Off by default: point them at
# the app's databases only where those are reachable from this
# cluster, with credentials from existing Secrets.
integrations:
  postgres:
    enabled: false
    # Secret with key `dsn`, e.g.
    # postgresql://user:pass@postgres:5432/db?sslmode=disable
    existingSecret: ""
  redis:
    enabled: false
    addr: "redis:6379"
    # Optional Secret with key `password`; omit for unauthenticated.
    existingSecret: ""
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {memory: 256Mi}

# Bridges the LiteLLM gateway's spend log into Prometheus (the OSS
# proxy has no /metrics). Enable only when the gateway runs in-cluster;
# reuses the gateway's image (python3 + stdlib script from a ConfigMap).
litellmExporter:
  enabled: false
  # nobody: the exporter is a mounted script that needs no identity.
  securityContext:
    runAsUser: 65534
  image:
    # Pinned to a released version, not the moving `main-stable` tag:
    # an air-gapped mirror cannot reproduce a tag whose contents change,
    # and a rollback by re-pulling the same tag is impossible.
    repository: ghcr.io/berriai/litellm-database
    tag: v1.93.0
    digest: ""
  litellmUrl: http://litellm:4000
  # Name of an existing Secret with key `masterKey` holding
  # LITELLM_MASTER_KEY. Never put the key itself in values.
  existingSecret: ""
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {memory: 128Mi}
