# Dashboards provisioned as code (#103) — loaded from /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: nexus-scheduler
    orgId: 1
    folder: Nexus Scheduler
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
