name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    services:
      # Real Postgres for the access.ts/webhookDelivery.ts/processor.ts
      # regression tests (§28) — those exercise the actual Prisma client
      # against real rows rather than mocking it, matching how this
      # project verifies everything else.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Real Redis for processor.ts's regression tests (§28) — those run
      # actual BullMQ Worker/Queue instances against it, same "no mocking
      # the system under test" posture as everything else here.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      # Only ever used by test fixtures/round-trip assertions below — not
      # a real secret, never used outside this CI job.
      API_KEY_ENCRYPTION_KEY: ci-test-encryption-key-32-characters!!
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Push schema to the test database
        run: npm run prisma:push --workspace=packages/shared

      - name: Build (compiles + typechecks every package)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # Runs separately from build-and-test since it needs neither Postgres/
  # Redis nor a build — just the installed dependency tree. Scoped to
  # --omit=dev so dev-only tooling vulnerabilities (e.g. in vite/vitest,
  # never shipped to production) don't block on something this project
  # can't ship differently; --audit-level=high still catches anything
  # that matters in a real runtime dependency.
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production dependencies, high+ severity)
        run: npm audit --omit=dev --audit-level=high
