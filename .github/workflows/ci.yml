name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    env:
      # prisma generate reads the datasource url from the env even though it
      # never connects; a dummy value keeps `prisma generate` from erroring.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Build (compiles + typechecks every package)
        run: npm run build

      - name: Test
        run: npm test
