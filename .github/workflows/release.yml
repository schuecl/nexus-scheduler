name: Release

# Fires when `npm run release` (scripts/release.mjs) has been reviewed
# and its tag pushed with `git push origin HEAD --follow-tags` — that's
# the deliberate, human-triggered step; this workflow never bumps
# anything or decides on its own to cut a release.
on:
  push:
    tags:
      - "v*.*.*"

# Doesn't cancel an in-progress publish on a re-trigger of the same tag —
# half-pushed images/chart under one version tag is worse than a slightly
# delayed second run.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Matches the Helm chart's `{{ image.repository }}-<service>`
        # naming (helm/nexus-scheduler/templates/*-deployment.yaml) and
        # each service's own Dockerfile location.
        service: [api, worker, frontend, pdf-service]
    steps:
      - uses: actions/checkout@v7

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nexus-scheduler-${{ matrix.service }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/nexus-scheduler-${{ matrix.service }}:latest
          # Mirror this repo's air-gapped target (Chart.yaml, values.yaml
          # image.registry comment): built here, then relocated by
          # operators into their own internal registry — this workflow
          # only needs to publish somewhere reachable for that mirroring
          # step, not into the internal registry itself.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  package-chart:
    name: Package & push Helm chart
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: helm package
        # Explicitly overrides Chart.yaml's committed version/appVersion
        # with the tag's version rather than trusting they already match
        # (scripts/release.mjs stamps them before a normal release, but
        # nothing enforces that a pushed tag went through that script —
        # a tag pushed without it left Chart.yaml stale and broke the
        # "helm push" step below, which assumes the packaged filename
        # matches the tag). This makes the published chart version
        # authoritative from the tag, the same way the image tags above
        # already are, regardless of what's committed in Chart.yaml.
        run: |
          for chart in helm/nexus-scheduler helm/test-ai; do
            helm package "$chart" \
              --version "${{ steps.version.outputs.version }}" \
              --app-version "${{ steps.version.outputs.version }}" \
              --destination .
          done

      - name: helm push (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          for chart in nexus-scheduler test-ai; do
            helm push "${chart}-${{ steps.version.outputs.version }}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: "*.tgz"
          retention-days: 1

  github-release:
    name: Create GitHub Release
    needs: [build-and-push, package-chart]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: helm-chart

      - name: Extract this version's CHANGELOG section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\[" ver "\\]") { found=1; next } }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for [$version] — check scripts/release.mjs ran correctly." >&2
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: false
          files: "*.tgz"
