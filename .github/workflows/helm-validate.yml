name: Helm Validate

# Lints the chart and validates the rendered manifests against the
# Kubernetes API schemas, so a chart change that produces invalid YAML is
# caught in CI rather than at deploy time.

on:
  pull_request:
    paths:
      - "helm/**"
      - "observability/grafana/dashboards/**"
      - ".github/workflows/helm-validate.yml"
  push:
    branches: [main, master]
    paths:
      - "helm/**"

permissions:
  contents: read

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: helm lint
        run: |
          helm lint helm/nexus-scheduler
          helm lint helm/observability
          helm lint helm/test-ai

      - name: Dashboards in sync with the chart copy
        # Helm can only template files inside the chart, so the Grafana
        # dashboards exist both at their source of truth
        # (observability/grafana/dashboards) and inside helm/observability.
        # The sync script makes the copy mechanical; this makes drift fail CI.
        run: scripts/sync-helm-dashboards.sh --check

      - name: helm template (render manifests)
        run: |
          helm template release helm/nexus-scheduler > rendered.yaml
          helm template release helm/observability >> rendered.yaml
          # Exercise the optional paths too — the exporter toggle and the
          # mirrored-registry/digest form both have to render valid YAML.
          helm template release helm/observability \
            --set litellmExporter.enabled=true \
            --set litellmExporter.existingSecret=ci-placeholder \
            --set global.imageRegistry=registry.example.internal >> rendered.yaml
          helm template release helm/test-ai >> rendered.yaml

      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate rendered manifests
        # -ignore-missing-schemas tolerates CRDs / vendored-subchart kinds not
        # in the upstream schema set; core kinds are still strictly validated.
        run: kubeconform -strict -ignore-missing-schemas -summary rendered.yaml
